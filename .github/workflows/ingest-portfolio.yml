name: ingest-portfolio

on:
  schedule:
    # Daily at 14:30 UTC (after discover-articles). IOF updates the portfolio
    # PDF "within 24/48 hours" of new positions, so a daily refresh keeps
    # weights + themes current.
    - cron: '30 14 * * *'
  workflow_dispatch:

concurrency:
  group: ingest-portfolio
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Ingest IOF portfolio
        env:
          IO_FUND_USERNAME: ${{ secrets.IO_FUND_USERNAME }}
          IO_FUND_PASSWORD: ${{ secrets.IO_FUND_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 scripts/ingest_portfolio.py
