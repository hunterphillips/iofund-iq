name: weekly-digest

on:
  schedule:
    # Friday at 21:00 UTC (5pm ET, 2pm PT).
    - cron: '0 21 * * 5'
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: "Overwrite an existing digest file for today (1 = yes)"
        required: false
        default: ''
      skip_pr:
        description: "Skip staleness check + PR (1 = yes)"
        required: false
        default: ''
      skip_email:
        description: "Skip Resend email (1 = yes)"
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run weekly digest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_FORCE_OVERWRITE: ${{ inputs.force_overwrite }}
          DIGEST_SKIP_PR: ${{ inputs.skip_pr }}
          DIGEST_SKIP_EMAIL: ${{ inputs.skip_email }}
        run: python3 scripts/digest_week.py
