name: hello

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Identify repo
        run: |
          echo "repo=${{ github.repository }}"
          echo "actor=${{ github.actor }}"
          echo "ref=${{ github.ref }}"
          echo "runner=$(uname -a)"

      - name: Verify required secrets are set (no values printed)
        env:
          IO_FUND_USERNAME: ${{ secrets.IO_FUND_USERNAME }}
          IO_FUND_PASSWORD: ${{ secrets.IO_FUND_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          missing=0
          check() {
            name="$1"; val="$2"
            if [ -z "$val" ]; then
              echo "MISSING: $name"
              missing=1
            else
              echo "OK:      $name (len=${#val})"
            fi
          }
          check IO_FUND_USERNAME    "$IO_FUND_USERNAME"
          check IO_FUND_PASSWORD    "$IO_FUND_PASSWORD"
          check RESEND_API_KEY      "$RESEND_API_KEY"
          check AI_GATEWAY_API_KEY  "$AI_GATEWAY_API_KEY"
          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing."
            exit 1
          fi
          echo "All required secrets present."
