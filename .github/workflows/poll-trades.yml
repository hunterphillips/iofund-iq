name: poll-trades

on:
  schedule:
    # Every 30 minutes, weekdays UTC. ~240 runs/week. Each ~10s.
    # POSIX cron: 0=Sunday, so 1-5 = Mon-Fri.
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:

concurrency:
  group: poll-trades
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Ingest IOF trades
        env:
          IO_FUND_USERNAME: ${{ secrets.IO_FUND_USERNAME }}
          IO_FUND_PASSWORD: ${{ secrets.IO_FUND_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 scripts/ingest_trades.py
